name: test-onboard-e2e-manual
on:
  workflow_dispatch:
jobs:
  double-onboard-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Run double onboard E2E
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NEMOCLAW_NON_INTERACTIVE: "1"
          NEMOCLAW_ACCEPT_THIRD_PARTY_SOFTWARE: "1"
        run: bash test/e2e/test-double-onboard.sh
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: double-onboard-test-log
          path: test-double-onboard-*.log
          if-no-files-found: ignore
  onboard-repair-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Run onboard repair E2E
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NEMOCLAW_NON_INTERACTIVE: "1"
          NEMOCLAW_ACCEPT_THIRD_PARTY_SOFTWARE: "1"
        run: bash test/e2e/test-onboard-repair.sh
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: onboard-repair-test-log
          path: test-onboard-repair-*.log
          if-no-files-found: ignore
  onboard-resume-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Run onboard resume E2E
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NEMOCLAW_NON_INTERACTIVE: "1"
          NEMOCLAW_ACCEPT_THIRD_PARTY_SOFTWARE: "1"
        run: bash test/e2e/test-onboard-resume.sh
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: onboard-resume-test-log
          path: test-onboard-resume-*.log
          if-no-files-found: ignore
  runtime-overrides-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Run runtime overrides E2E
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NEMOCLAW_NON_INTERACTIVE: "1"
          NEMOCLAW_ACCEPT_THIRD_PARTY_SOFTWARE: "1"
        run: bash test/e2e/test-runtime-overrides.sh
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-overrides-test-log
          path: test-runtime-overrides-*.log
          if-no-files-found: ignore
